server {
    listen 80;
    listen [::]:80;
    server_name staging.hrmanager4u.ai api.hrmanager4u.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name staging.hrmanager4u.ai;

    ssl_certificate /etc/letsencrypt/live/staging.hrmanager4u.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.hrmanager4u.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.hrmanager4u.ai;

    ssl_certificate /etc/letsencrypt/live/api.hrmanager4u.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.hrmanager4u.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Rate limiting zone (defined in nginx.conf)
    limit_req zone=api_limit burst=20 nodelay;

    location / {
        proxy_pass http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
