packages:
  - "apps/*"
  - "packages/*"
allowBuilds:
  '@prisma/engines': true
  '@scarf/scarf': true
  argon2: true
  bcrypt: true
  msgpackr-extract: true
  prisma: true
  sharp: set this to true or false
  unrs-resolver: true
minimumReleaseAgeExclude:
  - '@playwright/test@1.61.0'
  - playwright-core@1.61.0
  - playwright@1.61.0
