services:
  - type: web
    name: hrmanager4u-api
    env: node
    buildCommand: pnpm install && pnpm --filter api build
    startCommand: pnpm --filter api start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hrmanager4u-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

databases:
  - name: hrmanager4u-db
    databaseName: hrmanager4u
    user: hrmanager4u_user
