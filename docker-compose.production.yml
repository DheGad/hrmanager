version: "3.9"

# =============================================================================
# HRManager4U.ai — Production Docker Compose
# Uses pre-built images from registry
# =============================================================================

networks:
  hrmanager_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  nginx_certs:
    driver: local

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hrmanager_postgres
    restart: always
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hrmanager_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Expose only to internal network — never expose port externally in prod

  redis:
    image: redis:7-alpine
    container_name: hrmanager_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru --save 900 1 --save 300 10
    volumes:
      - redis_data:/data
    networks:
      - hrmanager_network
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: hrmanager_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - hrmanager_network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

  api:
    image: ghcr.io/hrmanager4u/api:${API_VERSION:-latest}
    container_name: hrmanager_api
    restart: always
    environment:
      NODE_ENV: production
    env_file:
      - .env.production
    networks:
      - hrmanager_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  web:
    image: ghcr.io/hrmanager4u/web:${WEB_VERSION:-latest}
    container_name: hrmanager_web
    restart: always
    environment:
      NODE_ENV: production
    env_file:
      - .env.production
    networks:
      - hrmanager_network
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    container_name: hrmanager_nginx
    restart: always
    volumes:
      - ./infrastructure/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - nginx_certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - hrmanager_network
    depends_on:
      - api
      - web
