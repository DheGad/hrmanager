version: "3.9"
networks:
  hrmanager_network:
    driver: bridge
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hrmanager_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-hrmanager4u}
      POSTGRES_USER: ${DATABASE_USER:-hrmanager}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-hrmanager_secret}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - hrmanager_network
  redis:
    image: redis:7-alpine
    container_name: hrmanager_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - hrmanager_network
  minio:
    image: minio/minio:latest
    container_name: hrmanager_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_secret}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - hrmanager_network
