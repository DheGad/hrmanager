# =============================================================================
# HRManager4U.ai — Production Docker Compose
# All services with healthchecks, resource limits, and named volumes
# =============================================================================

version: '3.9'

networks:
  hrm_internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
  hrm_external:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  nginx_logs:
  api_logs:

x-common-env: &common-env
  NODE_ENV: production
  TZ: Asia/Kuala_Lumpur

services:
  # ─── NGINX Reverse Proxy ─────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: hrm_nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    networks:
      - hrm_external
      - hrm_internal
    healthcheck:
      test: ['CMD', 'nginx', '-t']
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

  # ─── Next.js Web ─────────────────────────────────────────────────
  web:
    image: ${REGISTRY:-ghcr.io}/hrmanager4u-web:${IMAGE_TAG:-latest}
    build:
      context: apps/web
      dockerfile: Dockerfile
    container_name: hrm_web
    restart: unless-stopped
    environment:
      <<: *common-env
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://hrmanager4u.ai/api/v1}
      NEXT_PUBLIC_SENTRY_DSN: ${SENTRY_WEB_DSN:-}
    networks:
      - hrm_internal
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 15s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # ─── NestJS API ──────────────────────────────────────────────────
  api:
    image: ${REGISTRY:-ghcr.io}/hrmanager4u-api:${IMAGE_TAG:-latest}
    build:
      context: apps/api
      dockerfile: Dockerfile
    container_name: hrm_api
    restart: unless-stopped
    environment:
      <<: *common-env
      DATABASE_URL: postgresql://${DB_USER:-hrmanager}:${DB_PASSWORD:-hrmanager_secret}@postgres:5432/${DB_NAME:-hrmanager4u}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-hrmanager}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SENTRY_DSN: ${SENTRY_API_DSN:-}
      PORT: 4000
    volumes:
      - api_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - hrm_internal
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:4000/api/v1/health']
      interval: 30s
      timeout: 15s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G

  # ─── PostgreSQL with pgvector ────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hrm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-hrmanager}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hrmanager_secret}
      POSTGRES_DB: ${DB_NAME:-hrmanager4u}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - hrm_internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-hrmanager} -d ${DB_NAME:-hrmanager4u}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  # ─── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hrm_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - hrm_internal
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ─── MinIO Object Storage ────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: hrm_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_VOLUMES: /data
      MINIO_SITE_REGION: ap-southeast-1
    volumes:
      - minio_data:/data
    networks:
      - hrm_internal
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
