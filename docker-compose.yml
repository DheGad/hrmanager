version: '3.8'

services:
  postgres:
    image: ankane/pgvector:v0.5.1
    container_name: hrmanager4u_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-hrmanager4u}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hrmanager4u_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: hrmanager4u_api
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-password}@postgres:5432/${DB_NAME:-hrmanager4u}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-super-secret-jwt-key}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - STORAGE_ENDPOINT=http://host.docker.internal:9000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    command: >
      sh -c "pnpm prisma db push --accept-data-loss && pnpm prisma db seed && pnpm start:prod"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: hrmanager4u_web
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api/v1
    ports:
      - "3001:3001"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
